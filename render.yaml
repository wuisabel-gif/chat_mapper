services:
  # ---------------------------------------------------------------------------
  # Frontend: the built Vite static site.
  # ---------------------------------------------------------------------------
  - type: web
    name: chat-mapper
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      # Vite 8 needs Node >= 20.19 or >= 22.12.
      - key: NODE_VERSION
        value: "22.12.0"
      # Point the frontend at the backend proxy below. Render injects the
      # proxy's hostname at build time; the app prefixes https:// itself.
      - key: VITE_API_URL
        fromService:
          type: web
          name: chat-mapper-proxy
          property: host
    routes:
      # Single-page app: serve index.html for any unknown path.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

  # ---------------------------------------------------------------------------
  # Backend: tiny share-link fetch proxy (Node, zero deps). Lives in /server.
  # ---------------------------------------------------------------------------
  - type: web
    name: chat-mapper-proxy
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
