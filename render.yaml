services:
  - type: web
    name: chat-mapper
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: true
    envVars:
      # Vite 8 needs Node >= 20.19 or >= 22.12.
      - key: NODE_VERSION
        value: "22.12.0"
    routes:
      # Single-page app: serve index.html for any unknown path.
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
